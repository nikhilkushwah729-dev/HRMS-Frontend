@if (showRefreshStrip()) {
  <div class="refresh-banner">
    <div class="refresh-text">
      <span class="status-indicator"></span>
      New version available. Refresh to update.
    </div>
    <button (click)="reload()" class="refresh-button">
      REFRESH
    </button>
  </div>
  <div class="h-10-spacer"></div>
}

<!-- Top Progress Bar (Existing) -->
<app-top-loader />

<!-- Main Pulsating Loader -->
@if (loading$ | async) {
  <app-main-loader />
}

<router-outlet />

<!-- Offline Indicator -->
@if (!isOnline) {
  <div class="fixed bottom-4 left-4 z-[9999] bg-red-600 text-white px-4 py-2 rounded-lg shadow-lg flex items-center gap-2 animate-in slide-in-from-left">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M2 12h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H4"/>
      <path d="M20 12h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/>
      <line x1="12" y1="2" x2="12" y2="4"/>
      <line x1="12" y1="20" x2="12" y2="22"/>
      <path d="M4.93 4.93l1.41 1.41"/>
      <path d="M17.66 17.66l1.41 1.41"/>
      <path d="M4.93 19.07l1.41-1.41"/>
      <path d="M17.66 6.34l1.41-1.41"/>
    </svg>
    <span class="font-medium text-sm">You are offline</span>
  </div>
}

<app-toast />
<app-confirm-modal />

<!-- User Limit Modal -->
<app-custom-modal 
  [openModal]="userLimitService.openModal" 
  (closeModal)="userLimitService.closeModal()" 
  maxWidth="max-w-[440px]" 
  [clickOutside]="true" 
  [crossButton]="true"
>
  <!-- Warning Icon -->
  <div class="mx-auto mb-6 w-20 h-20 bg-rose-50 rounded-full flex items-center justify-center">
    <div class="w-12 h-12 bg-rose-500 rounded-full flex items-center justify-center shadow-lg shadow-rose-500/20">
      <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>
  </div>

  <!-- Message Text -->
  <h2 class="text-xl font-bold text-slate-900 mb-2">User Limit Exceeded</h2>
  <p class="text-slate-500 text-sm mb-8 leading-relaxed">
    You have reached the employee limit for your current plan. Please upgrade your subscription to add more team members.
  </p>

  <!-- Upgrade Button -->
  <div class="flex justify-center items-center gap-3">
    <app-custom-button (btnClick)="upgrade()">Upgrade Plan</app-custom-button>
    <app-custom-button type="secondary" (btnClick)="userLimitService.closeModal()">Dismiss</app-custom-button>
  </div>
</app-custom-modal>
